min_version = "4.55.0"
env_list = ["py310", "py311", "py312", "py313", "py314", "ruff", "mypy", "pyright", "tach", "slotscheck"]
isolated_build = true
recreate = true
labels = { test = ["py310", "py311", "py312", "py313", "py314"], static = ["ruff", "mypy", "pyright", "tach", "slotscheck"] }

[env_run_base]
pass_env = ["CI", "GITHUB_*", "CODECOV_*"]
deps = ["-e .[test]"]
commands = [["pytest", "--basetemp={envtmpdir}", "--cov-report=term", "--junitxml=results.xml"],
    ["codecov"],
]

[env.ruff]
skip_install = true
deps = ["ruff"]
commands = [["ruff", "check", "src", "tests"]]

[env.mypy]
skip_install = true
deps = ["mypy", "numpy", "pydantic"]
commands = [["mypy", "--strict", "--ignore-missing-imports", "--disallow-any-explicit", "--allow-untyped-decorators", "--exclude", "/scripts/", "src", "tests"],
]

[env.pyright]
deps = ["pyright", "[test]"]
commands = [["pyright"]]

[env.slotscheck]
deps = ["slotscheck", "[gui-deps]"]
commands = [["python", "-m", "slotscheck", "."]]

[env.tach]
skip_install = true
deps = ["tach"]
commands = [["tach", "check"]]
