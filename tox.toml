min_version = "4.53.1"
env_list = ["py3.10", "py3.11", "py3.12", "py3.13", "py3.14", "ruff", "mypy", "pyright", "tach", "slotscheck"]
isolated_build = true
recreate = true
labels = { test = ["py3.10", "py3.11", "py3.12", "py3.13", "py3.14"], static = ["ruff", "mypy", "pyright", "tach", "slotscheck"] }

[gh.python]
#"310" = ["py310"]
#"311" = ["py311"]
#"312" = ["py312"]
#"313" = ["py313"]
"314" = ["ruff", "mypy", "pyright", "tach", "slotscheck", "py3.14"]

[env_run_base]
pass_env = ["CI", "GITHUB_*", "CODECOV_*"]
#set_env.COVERAGE_FILE = "{envtmpdir}/.coverage"
deps = ["-e .[test]"]
commands = [["pytest", "--basetemp={envtmpdir}", "--cov-report=term", "--junitxml=results.xml"],
    ["codecov"],
]

[env.ruff]
skip_install = true
deps = ["ruff"]
commands = [["ruff", "check", "src", "tests"]]

[env.mypy]
skip_install = true
deps = ["mypy", "numpy"]
commands = [["mypy", "--strict", "--ignore-missing-imports", "--disallow-any-explicit", "--allow-untyped-decorators", "--exclude", "/scripts/", "src", "tests"],
]

[env.pyright]
deps = ["pyright", "[test]"]
commands = [["pyright"]]

[env.slotscheck]
deps = ["slotscheck"]
commands = [["python", "-m", "slotscheck", "."]]

[env.tach]
skip_install = true
deps = ["tach"]
commands = [["tach", "check"]]
