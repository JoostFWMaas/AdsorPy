name: CI

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  # Added weekly schedule to automatically catch upstream breaking changes
  schedule:
    - cron: '0 0 * * 1' # Runs every Monday at 00:00 UTC

  push:
    branches-ignore: [ main ]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "images/**"

permissions: {}

jobs:
  test:
    name: Python Tests
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        python-version: [ '3.10', '3.11', '3.12', '3.13', '3.14' ]
        # Default behaviour uses the standard frozen lockfile
        resolution-strategy: [ default ]

        include:
          # Test absolute lowest bounds (Ubuntu, standard Python version)
          - os: ubuntu-latest
            python-version: '3.13'
            resolution-strategy: lowest
          # Test latest available package upgrades on PyPI
          - os: ubuntu-latest
            python-version: '3.13'
            resolution-strategy: latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          version: "0.11.26"

      # --- Dependency Resolution Customizations ---

      - name: Force Lowest Resolution Bounds
        if: matrix.resolution-strategy == 'lowest'
        run: uv lock --resolution=lowest

      - name: Force Latest Package Upgrades
        if: matrix.resolution-strategy == 'latest'
        run: uv lock --upgrade

      # --- Environment Sync & Execution ---

      # Note: --frozen is omitted if we are mutating the lockfile above
      - name: Install tox and plugins
        run: |
          if [ "${{ matrix.resolution-strategy }}" = "default" ]; then
            uv sync --frozen --extra envs --no-default-groups
          else
            uv sync --extra envs --no-default-groups
          fi
        shell: bash

      - name: Run static checks
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.14' && matrix.resolution-strategy == 'default'
        run: uv run tox -m static

      - name: Run tests with tox
        run: uv run tox -e py$(echo ${{ matrix.python-version }} | tr -d '.')

      - name: Upload test results
        if: always() && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.14' && matrix.resolution-strategy == 'default'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: junit-results
          path: results.xml

      - name: Upload coverage reports to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.14' && matrix.resolution-strategy == 'default'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.GIST_SECRET }}

  ci-success:
    permissions: {}
    name: CI
    runs-on: ubuntu-latest
    needs: test
    if: success()
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - run: echo "All matrix tests passed"
