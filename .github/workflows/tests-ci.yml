name: CI

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

  push:
    branches-ignore: [ main ]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "images/**"


permissions: {}

jobs:
  test:
    name: Python Tests
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        python-version: [ '3.10', '3.11', '3.12', '3.13', '3.14' ]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.16"

      - name: Install tox and plugins
        run: uv sync --frozen --extra envs --no-default-groups

      - name: Run static checks
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.14'
        run: uv run tox -m static

      - name: Run tests with tox
        run: uv run tox -e py$(echo ${{ matrix.python-version }} | tr -d '.')

      - name: Upload test results
        if: always() && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.14'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: junit-results
          path: results.xml

      - name: Upload coverage reports to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.14'
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          token: ${{ secrets.GIST_SECRET }}

  ci-success:
    permissions: {}
    name: CI
    runs-on: ubuntu-latest
    needs: test
    if: success()
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - run: echo "All matrix tests passed"
