name: release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  PACKAGE_NAME: adsorpy

jobs:
  build:
    name: build + reproducible artifacts
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}

    permissions:
      contents: read
      id-token: write

    env:
      SOURCE_DATE_EPOCH: "0"
      PYTHONHASHSEED: "0"
      UV_FROZEN: "1"

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.14"

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b

      - name: Cache uv
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.cache/uv
          key: uv-${{ hashFiles('uv.lock') }}

      # -------------------------------
      # SBOM GENERATION + SIGNING INPUT
      # -------------------------------
      - name: Generate SBOM
        uses: sbomify/sbomify-action@ac8b0d423c90447f3011ef8ab5f9ff2e854c6931
        env:
          LOCK_FILE: uv.lock
          OUTPUT_FILE: sbom.cdx.json
          UPLOAD: false
          COMPONENT_NAME: ${{ env.PACKAGE_NAME }}
          COMPONENT_VERSION: ${{ github.ref_name }}
          ENRICH: true

      # -------------------------------
      # INSTALL BUILD TOOLS
      # -------------------------------
      - name: Install build and validation tools
        run: |
          set -euo pipefail
          uv sync --frozen --extra dev-misc --no-default-groups

      # -------------------------------
      # DETERMINISTIC DOUBLE BUILD
      # -------------------------------
      - name: Build #1
        run: |
          set -euo pipefail
          rm -rf dist1 dist2 dist
          mkdir dist1 dist2
          uv run python -m build --outdir dist1

      - name: Build #2 (candidate reproducible)
        run: |
          set -euo pipefail
          uv run python -m build --outdir dist2

      - name: Compare builds
        run: |
          set -euo pipefail
          rm -rf reproducibility
          mkdir reproducibility
          sha256sum dist1/*.whl | awk '{print $1}' > reproducibility/hashes1.txt
          sha256sum dist2/*.whl | awk '{print $1}' > reproducibility/hashes2.txt
          diff reproducibility/hashes1.txt reproducibility/hashes2.txt
          echo "Reproducible build OK"

      - name: Promote reproducible build to dist/
        run: |
          set -euo pipefail
          rm -rf dist
          mv dist2 dist


      - name: Generate hashes.txt
        run: |
          set -euo pipefail
          sha256sum dist/*.whl dist/*.tar.gz > hashes.txt


      # -------------------------------
      # VALIDATION ON REPRODUCIBLE BUILD
      # -------------------------------
      - name: Twine check
        run: |
          set -euo pipefail
          uv run python -m twine check dist/*

      - name: Check wheel contents
        run: |
          set -euo pipefail
          uv tool run check-wheel-contents dist/*.whl

      - name: Smoke test (wheel)
        run: |
          set -euo pipefail
          uv run --no-project pip install dist/*.whl
          uv run --no-project python -c "import ${PACKAGE_NAME}; print(${PACKAGE_NAME}.__version__)"

      - name: Smoke test (sdist)
        run: |
          set -euo pipefail
          uv run --no-project pip install dist/*.tar.gz
          uv run --no-project python -c "import ${PACKAGE_NAME}; print(${PACKAGE_NAME}.__version__)"

      - name: Verify version matches tag
        run: |
          set -euo pipefail
          python - <<EOF
          import re
          import sys
          from packaging.version import Version

          import ${PACKAGE_NAME}

          expected_raw = "${GITHUB_REF_NAME}"
          actual = Version(${PACKAGE_NAME}.__version__)

          # Normalize Git tag → PEP 440
          expected = expected_raw

          # strip leading "v"
          expected = re.sub(r"^v", "", expected)

          # convert semver prerelease → PEP 440
          expected = expected.replace("-alpha.", "a")
          expected = expected.replace("-beta.", "b")
          expected = expected.replace("-rc.", "rc")

          # drop build metadata (+...)
          expected = re.sub(r"\+.*$", "", expected)

          expected = Version(expected)

          if actual != expected:
              print(f"Version mismatch: {actual} != {expected} (from {expected_raw})")
              sys.exit(1)

          print(f"Version OK: {actual}")
          EOF

      - name: Generate base64 subject hashes
        id: hash
        run: |
          set -euo pipefail
          HASHES=$(sha256sum dist/*.whl dist/*.tar.gz | base64 -w0)
          echo "hashes=$HASHES" >> "$GITHUB_OUTPUT"

      - name: Upload dist artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: dist
          path: |
            dist/
            hashes.txt

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sbom
          path: sbom.cdx.json

  sign:
    name: sign reproducible artifacts + SBOM
    needs: build
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: dist
          path: .

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: sbom
          path: .

      - name: List artifacts
        run: |
          echo "Files:"
          find . -maxdepth 2 -type f

      - name: Sign SBOM (Sigstore)
        uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc
        with:
          inputs: sbom.cdx.json
          staging: false
          verify: true
          verify-cert-identity: https://github.com/${{ github.repository }}/.github/workflows/publish_to_PyPI.yml@${{ github.ref }}
          verify-oidc-issuer: https://token.actions.githubusercontent.com
          upload-signing-artifacts: false
          release-signing-artifacts: false

      - name: Sign artifacts (Sigstore)
        uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc
        with:
          inputs: dist/*.whl dist/*.tar.gz hashes.txt
          staging: false
          verify: true
          verify-cert-identity: https://github.com/${{ github.repository }}/.github/workflows/publish_to_PyPI.yml@${{ github.ref }}
          verify-oidc-issuer: https://token.actions.githubusercontent.com
          upload-signing-artifacts: false
          release-signing-artifacts: false

      - name: Upload signed artifacts + SBOM bundles
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: signed-dist
          path: |
            dist/
            hashes.txt
            sbom.cdx.json
            sbom.cdx.json.sigstore.json

  provenance:
    needs: [build]
    permissions:
      actions: read
      id-token: write
      contents: write

#    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.build.outputs.hashes }}"
      upload-assets: true

  publish-testpypi:
    name: publish to TestPyPI
    needs: [build, sign]
    runs-on: ubuntu-latest
    environment:
      name: pypi

    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: dist
          path: .

      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit

      - name: Show hashes (pre-publish verification)
        run: cat hashes.txt

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          repository-url: https://test.pypi.org/legacy/
          print-hash: true
          attestations: true

  verify-install:
    name: verify install from TestPyPI
    needs: publish-testpypi
    runs-on: ubuntu-latest

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b

      - name: Normalize version
        id: normalize_version
        run: |
          VERSION="${GITHUB_REF_NAME}"

          VERSION="${VERSION#v}"                 # strip leading v
          VERSION="${VERSION/-alpha./a}"
          VERSION="${VERSION/-beta./b}"
          VERSION="${VERSION/-rc./rc}"
          VERSION=$(echo "$VERSION" | sed 's/+.*//')  # remove build metadata

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install from TestPyPI
        run: |
          set -euo pipefail
          uv run --no-project pip install \
            --index-url https://test.pypi.org/simple \
            --extra-index-url https://pypi.org/simple \
            ${PACKAGE_NAME}==${{ steps.normalize_version.outputs.version }}
          uv run --no-project python -c "import ${PACKAGE_NAME}; print(${PACKAGE_NAME}.__version__)"

      - name: Verify import outside project tree
        run: |
          set -euo pipefail
          mkdir /tmp/testimport
          cd /tmp/testimport
          uv run --no-project python -c "import ${PACKAGE_NAME}; print('Import OK')"

  publish:
    name: publish to PyPI
    needs: verify-install
    runs-on: ubuntu-latest

    environment:
      name: pypi

    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: signed-dist
          path: .

      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit

      - name: Verify hashes before publish
        run: |
          set -euo pipefail
          sha256sum -c hashes.txt

      - name: Remove Sigstore files before publish
        run: rm -f dist/*.sigstore.json

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          attestations: true
          print-hash: true

  create-release:
    name: create immutable GitHub release
    needs: [publish, sign, provenance]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: dist
          path: .

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: signed-dist
          path: signed/

      - name: Collect release files
        run: |
          set -euo pipefail
          mkdir release-assets
          cp dist/* release-assets/
          cp signed/* release-assets/ || true

      - name: Create GitHub Release (immutable)
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          files: release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
