name: release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  PACKAGE_NAME: adsorpy

jobs:
  build:
    name: build + reproducible artifacts
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}

    permissions:
      contents: read
      id-token: write

    env:
      SOURCE_DATE_EPOCH: "0"
      PYTHONHASHSEED: "0"
      UV_FROZEN: "1"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.cache/uv
          key: uv-${{ hashFiles('uv.lock') }}

      # SBOM
      - name: Generate SBOM
        uses: sbomify/sbomify-action@ac8b0d423c90447f3011ef8ab5f9ff2e854c6931
        env:
          LOCK_FILE: uv.lock
          OUTPUT_FILE: sbom.cdx.json
          UPLOAD: false
          COMPONENT_NAME: ${{ env.PACKAGE_NAME }}
          COMPONENT_VERSION: ${{ github.ref_name }}
          ENRICH: true

      - name: Install build tools
        run: uv sync --frozen --extra dev-misc --no-default-groups

      # -------------------------------
      # DOUBLE BUILD FOR REPRODUCIBILITY
      # -------------------------------
      - name: Build #1
        run: |
          rm -rf dist1 dist2 dist
          mkdir dist1 dist2
          uv run python -m build --outdir dist1

      - name: Build #2 (candidate reproducible)
        run: uv run python -m build --outdir dist2

      - name: Compare builds
        run: |
          sha256sum dist1/* > dist1/hashes.txt
          sha256sum dist2/* > dist2/hashes.txt
          diff dist1/hashes.txt dist2/hashes.txt
          echo "Reproducible build OK"

      - name: Promote reproducible build
        run: |
          mv dist2 dist
          cp dist1/hashes.txt dist/hashes.txt

      # -------------------------------
      # VALIDATION
      # -------------------------------
      - name: Twine check
        run: uv run python -m twine check dist/*

      - name: Check wheel contents
        run: uv run python -m check-wheel-contents dist/*.whl

      - name: Smoke test (wheel)
        run: |
          uv run --no-project pip install dist/*.whl
          uv run --no-project python -c "import ${PACKAGE_NAME}; print(${PACKAGE_NAME}.__version__)"

      - name: Smoke test (sdist)
        run: |
          uv run --no-project pip install dist/*.tar.gz
          uv run --no-project python -c "import ${PACKAGE_NAME}; print(${PACKAGE_NAME}.__version__)"

      - name: Verify version matches tag
        run: |
          python - <<EOF
          import ${PACKAGE_NAME}, sys
          expected = "${GITHUB_REF_NAME}"
          actual = ${PACKAGE_NAME}.__version__
          if actual != expected:
              print(f"Version mismatch: {actual} != {expected}")
              sys.exit(1)
          print("Version OK:", actual)
          EOF

      - name: Generate base64 subject hashes
        id: hash
        run: |
          cd dist
          HASHES=$(sha256sum * | base64 -w0)
          echo "hashes=$HASHES" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: dist
          path: dist/

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sbom
          path: sbom.cdx.json

  sign:
    name: sign artifacts + SBOM
    needs: build
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: dist
          path: dist/

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: sbom
          path: .

      - name: Sign SBOM
        uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc
        with:
          inputs: sbom.cdx.json
          release-signing-artifacts: false

      - name: Sign artifacts
        uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc
        with:
          inputs: dist/*
          release-signing-artifacts: false

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: signed
          path: |
            dist/
            sbom.cdx.json
            sbom.cdx.json.sigstore.json

  provenance:
    needs: build
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a
    with:
      base64-subjects: "${{ needs.build.outputs.hashes }}"
      upload-assets: true

  publish-testpypi:
    needs: [build, sign]
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          repository-url: https://test.pypi.org/legacy/
          attestations: true
          print-hash: true

  verify-install:
    needs: publish-testpypi
    runs-on: ubuntu-latest

    steps:
      - name: Install from TestPyPI
        run: |
          uv run --no-project pip install \
            --index-url https://test.pypi.org/simple \
            --extra-index-url https://pypi.org/simple \
            ${PACKAGE_NAME}==${{ github.ref_name }}

      - name: Verify import outside project tree
        run: |
          mkdir /tmp/testimport
          cd /tmp/testimport
          uv run --no-project python -c "import ${PACKAGE_NAME}; print('Import OK')"

  publish:
    needs: verify-install
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: dist
          path: dist/

      - name: Verify hashes
        run: sha256sum -c dist/hashes.txt

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          attestations: true
          print-hash: true

  create-release:
    name: create immutable GitHub release
    needs: [publish, sign, provenance]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: dist
          path: dist/

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: signed
          path: signed/

      - name: Collect release assets
        run: |
          mkdir release-assets
          cp dist/* release-assets/
          cp signed/* release-assets/ || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          files: release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
